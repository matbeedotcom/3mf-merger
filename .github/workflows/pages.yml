name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked

      - name: Build browser WASM package
        run: |
          cargo build --lib --release --target wasm32-unknown-unknown --features wasm
          wasm-bindgen --target web --out-dir pkg target/wasm32-unknown-unknown/release/three_mf_merger.wasm

      - name: Assemble Pages artifact
        run: |
          mkdir -p dist
          cp demo.html dist/demo.html
          cp -R pkg dist/pkg
          cp pages-index.html dist/index.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
