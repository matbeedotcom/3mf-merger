<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3MF Merger</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .drop-zone {
            border: 3px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            transition: border-color 0.3s;
        }
        .drop-zone.drag-over {
            border-color: #007bff;
            background-color: #f0f8ff;
        }
        .file-list {
            margin: 20px 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            margin: 5px 0;
        }
        .file-item input[type="checkbox"] {
            margin-right: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background: #0056b3;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .download-link:hover {
            background: #218838;
        }
        h1 { color: #333; }
        h2 { color: #555; }
    </style>
</head>
<body>
    <h1>3MF Merger</h1>
    <p>Merge multiple Bambu Studio <code>.3mf</code> project files into one merged <code>.3mf</code> package entirely in the browser.</p>

    <div class="drop-zone" id="dropZone">
        <p>Drag and drop <code>.3mf</code> files here, or click to select</p>
        <input type="file" id="fileInput" multiple accept=".3mf" style="display: none;">
    </div>

    <div class="file-list" id="fileList"></div>

    <button id="mergeBtn" disabled>Merge Files</button>

    <div class="status" id="status"></div>

    <script type="module">
        import init, { merge_files, WasmMergeOptions } from './pkg/three_mf_merger.js';

        let wasmInitialized = false;

        async function initializeWasm() {
            if (!wasmInitialized) {
                await init();
                wasmInitialized = true;
            }
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        const status = document.getElementById('status');

        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(Array.from(e.dataTransfer.files));
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(Array.from(e.target.files));
        });

        function handleFiles(files) {
            const validFiles = files.filter(f => f.name.endsWith('.3mf') || f.name.endsWith('.3MF'));
            if (validFiles.length !== files.length) {
                showStatus('Some files were ignored (only .3mf files accepted)', 'error');
            }
            selectedFiles = [...selectedFiles, ...validFiles];
            updateFileList();
            mergeBtn.disabled = selectedFiles.length < 2;
        }

        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <label><input type="checkbox" checked data-index="${index}"> ${file.name} (${formatBytes(file.size)})</label>
                    <button onclick="removeFile(${index})">Remove</button>
                `;
                fileList.appendChild(item);
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            mergeBtn.disabled = selectedFiles.length < 2;
        };

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type;
        }

        mergeBtn.addEventListener('click', async () => {
            if (selectedFiles.length < 2) {
                showStatus('Please select at least 2 .3mf files', 'error');
                return;
            }

            showStatus('Loading WASM module...', 'loading');
            await initializeWasm();

            showStatus('Reading files...', 'loading');
            const fileArrays = [];
            for (const file of selectedFiles) {
                const arrayBuffer = await file.arrayBuffer();
                fileArrays.push(new Uint8Array(arrayBuffer));
            }

            showStatus('Merging files...', 'loading');
            try {
                const options = new WasmMergeOptions();
                const result = merge_files(fileArrays, options);

                showStatus('Merge successful!', 'success');

                // Generate output filename from input filenames
                const baseNames = selectedFiles.map(f => f.name.replace(/\.3mf$/i, ''));
                const outputName = baseNames.join('_') + '_merged.3mf';

                const blob = new Blob([result], { type: 'application/vnd.ms-package.3dmanufacturing-3dmodel+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = outputName;
                link.className = 'download-link';
                link.textContent = `Download ${outputName}`;
                link.onclick = () => setTimeout(() => URL.revokeObjectURL(url), 100);
                status.appendChild(document.createElement('br'));
                status.appendChild(link);

            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
                console.error(err);
            }
        });
    </script>
</body>
</html>
